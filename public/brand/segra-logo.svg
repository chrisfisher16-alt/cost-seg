  </g>

  <!-- Tagline -->
  <g transform="translate(132, 100)">
    <text x="0" y="0"
          font-family="Lato, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="500"
          font-size="12"
