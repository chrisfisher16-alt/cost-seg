<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-label="Segra logo">
  <title>Segra</title>

  <!-- === Icon (left) === -->
  <g transform="translate(0,0)">
    <line x1="22" y1="92" x2="98" y2="92" stroke="#CBD5DE" stroke-width="2" stroke-linecap="round"/>
    <rect x="26" y="72" width="12" height="20" rx="2" fill="#5B89AD"/>
    <rect x="44" y="60" width="12" height="32" rx="2" fill="#8FB4D1"/>
    <rect x="62" y="46" width="12" height="46" rx="2" fill="#D97757"/>
    <rect x="80" y="30" width="12" height="62" rx="2" fill="#E89A4A"/>
    <path d="M 22 86 Q 30 28, 100 22" fill="none" stroke="#E89A4A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="100,22 92,18 94,26" fill="#E89A4A"/>
  </g>

  <!-- === Wordmark === -->
  <g transform="translate(130, 78)">
    <text x="0" y="0"
          font-family="Lato, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="700"
