name: E2E

# Playwright + Chromium. Manual-trigger-only for now — the suite hits
# routes that talk to Supabase + Postgres + Stripe at runtime (the
# estimator persists a lead row, intake redirects require real auth, etc).
# Placeholder env gets through `next build` but not through a running app.
#
# To enable on push/PR later: wire these GitHub Actions secrets
#   - DATABASE_URL, DIRECT_URL (ideally a dedicated test DB, NOT prod)
#   - NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   - SUPABASE_SERVICE_ROLE_KEY
#   - STRIPE_* (test-mode keys are fine)
# Then add `push:` and `pull_request:` triggers below and replace the env:
# block's placeholders with `${{ secrets.* }}` refs for the ones that need
# real values.
#
# Until then, run locally:  pnpm test:e2e

on:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Same placeholder env as CI — the e2e suite currently avoids Supabase
    # and Stripe real calls (see tests/e2e — every spec hits marketing,
    # infra, or static routes). If that changes, wire real secrets in
    # via GitHub Actions secrets.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key-at-least-twenty-chars
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-at-least-twenty-chars
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      ANTHROPIC_API_KEY: ci-placeholder-anthropic-key-at-least-twenty-chars
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_ID_DIY: price_ci_diy
      STRIPE_PRICE_ID_TIER_1: price_ci_tier_one
      STRIPE_PRICE_ID_TIER_2: price_ci_tier_two
      RESEND_API_KEY: re_ci_placeholder
      RESEND_FROM_EMAIL: Segra <ci@example.test>
      INNGEST_EVENT_KEY: ci-placeholder-inngest-event
      INNGEST_SIGNING_KEY: ci-placeholder-inngest-signing

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Install Playwright browsers
        # Cache key hashes pnpm-lock.yaml so we only re-download browsers
        # when Playwright version changes with the lockfile.
        run: pnpm exec playwright install chromium --with-deps

      - name: Build
        run: pnpm build

      - name: E2E tests
        run: pnpm test:e2e

      # Upload the HTML report on failure so we can see screenshots/videos
      # without re-running locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
