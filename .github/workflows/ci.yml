name: CI

# Fast feedback on every push/PR to main: typecheck, lint, format,
# unit tests, and `next build`. E2E is split into a separate workflow
# because Playwright + browser install adds ~3 min and e2e needs real
# Supabase env vars that CI secrets haven't been wired up for yet.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Typecheck · Lint · Format · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Placeholder values — enough to satisfy env() schema validation at build
    # time without leaking real secrets into CI. env() is lazy (see lib/env.ts),
    # so these only matter for routes that call it during prerendering.
    # Production deploys pick up the real values from Vercel project env.
    env:
      # Opt into Node 24 for the action runtime ahead of the Sept 2026 cutover
      # (otherwise every run emits a deprecation warning for Node 20 actions).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key-at-least-twenty-chars
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-at-least-twenty-chars
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      ANTHROPIC_API_KEY: ci-placeholder-anthropic-key-at-least-twenty-chars
      AWS_ACCESS_KEY_ID: ci-placeholder-aws-access
      AWS_SECRET_ACCESS_KEY: ci-placeholder-aws-secret-key
      AWS_REGION: us-east-1
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_ID_TIER_1: price_ci_tier_one
      STRIPE_PRICE_ID_TIER_2: price_ci_tier_two
      RESEND_API_KEY: re_ci_placeholder
      RESEND_FROM_EMAIL: Segra <ci@example.test>
      INNGEST_EVENT_KEY: ci-placeholder-inngest-event
      INNGEST_SIGNING_KEY: ci-placeholder-inngest-signing

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — package.json's `packageManager: pnpm@x.y.z`
      # field is the source of truth, and setting both makes action-setup@v4
      # refuse to run.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
